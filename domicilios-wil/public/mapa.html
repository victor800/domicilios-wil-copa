<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>Farmacias WIL</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;font-family:'Plus Jakarta Sans',sans-serif;-webkit-font-smoothing:antialiased}
.sym{font-family:'Material Symbols Rounded';font-weight:normal;font-style:normal;line-height:1;text-transform:none;display:inline-block;white-space:nowrap;direction:ltr;font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24}
.sym.f{font-variation-settings:'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 24}

@keyframes ping{0%{transform:scale(1);opacity:.85}70%{transform:scale(3);opacity:0}100%{opacity:0}}
@keyframes ping2{0%{transform:scale(1);opacity:.35}70%{transform:scale(5.5);opacity:0}100%{opacity:0}}
@keyframes floatUp{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes gradFlow{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
@keyframes rotSlow{to{transform:rotate(360deg)}}
@keyframes pulseGlow{0%,100%{box-shadow:0 6px 22px rgba(5,150,105,.45)}60%{box-shadow:0 8px 34px rgba(5,150,105,.65),0 0 0 10px rgba(5,150,105,.07)}}
@keyframes scrollX{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}

/* Nuevo efecto botón flotante: shimmer diagonal sweeping */
@keyframes shimmerSweep{
  0%{transform:translateX(-100%) skewX(-15deg);opacity:0}
  40%{opacity:.6}
  100%{transform:translateX(250%) skewX(-15deg);opacity:0}
}
/* Rebote suave */
@keyframes bounceFE{
  0%,100%{transform:translateY(0) scale(1)}
  30%{transform:translateY(-7px) scale(1.06)}
  60%{transform:translateY(-2px) scale(.98)}
}
/* Halo giratorio de puntos */
@keyframes spinHalo{to{transform:rotate(360deg)}}
/* Destello puntual */
@keyframes sparkle{
  0%,100%{opacity:0;transform:scale(0)}
  50%{opacity:1;transform:scale(1)}
}

/* LAYOUT */
#app{position:fixed;inset:0;display:flex;flex-direction:column;background:#f5f3ff;transition:background .4s}

/* HEADER */
#hdr{
  flex-shrink:0;z-index:100;
  padding:calc(env(safe-area-inset-top,0px) + 14px) 16px 0;
  background:rgba(255,255,255,.98);backdrop-filter:blur(24px);
  border-bottom:1px solid rgba(0,0,0,.05);
  box-shadow:0 1px 8px rgba(0,0,0,.05);
}
.hr1{display:flex;align-items:center;gap:10px;padding-bottom:10px}
.hback{width:34px;height:34px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.06);transition:.15s}
.hback:active{transform:scale(.86)}
.hemb{width:34px;height:34px;border-radius:10px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:17px}
.htxt{flex:1;min-width:0}
.hname{font-size:14px;font-weight:900;letter-spacing:-.015em;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hsub{font-size:9.5px;color:#9aa5ae;font-weight:500;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hpill{flex-shrink:0;display:flex;align-items:center;gap:4px;background:rgba(22,163,74,.1);border-radius:99px;padding:5px 10px}
.hpill-dot{width:6px;height:6px;border-radius:50%;background:#16a34a;position:relative}
.hpill-dot::after{content:'';position:absolute;inset:-3px;border-radius:50%;background:rgba(22,163,74,.28);animation:ping 1.9s ease-in-out infinite}
.hpill-txt{font-size:9.5px;font-weight:800;color:#16a34a}
.tabsw{display:flex;background:rgba(0,0,0,.045);border-radius:12px;padding:3px;margin-bottom:11px;gap:3px}
.tsw{flex:1;padding:7px 5px;border:none;background:transparent;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;font-size:11px;font-weight:700;color:#9aa5ae;border-radius:9px;display:flex;align-items:center;justify-content:center;gap:4px;transition:all .2s;white-space:nowrap}
.tsw.on{color:#fff;font-weight:800;box-shadow:0 2px 12px rgba(0,0,0,.18)}

/* ── Tab Expertos: más separación top ── */
#tsw-expertos{margin-top:2px}

/* MAPA — más grande */
#mapW{flex-shrink:0;height:300px;position:relative;overflow:hidden}
#theMap{width:100%;height:100%}
.leaflet-control-attribution{display:none!important}
.leaflet-control-zoom{border:none!important;box-shadow:0 4px 16px rgba(0,0,0,.14)!important;border-radius:13px!important;overflow:hidden;margin-right:10px!important;margin-top:10px!important}
.leaflet-control-zoom a{width:38px!important;height:38px!important;line-height:38px!important;font-size:17px!important;border:none!important}

/* Chip info sobre mapa */
#mchip{
  position:absolute;top:12px;left:50%;transform:translateX(-50%);
  z-index:500;pointer-events:none;
  background:rgba(255,255,255,.96);backdrop-filter:blur(16px);
  border-radius:99px;padding:6px 14px 6px 8px;
  display:flex;align-items:center;gap:7px;
  box-shadow:0 4px 18px rgba(0,0,0,.12);white-space:nowrap;
}
.mchip-ico{width:24px;height:24px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;background:rgba(0,0,0,.05)}
.mchip-name{font-size:11px;font-weight:800;color:#18222e}
.mchip-sub{font-size:9px;color:#7a8fa6;font-weight:600;margin-top:1px}

/* ══════════════════════════════════════
   BOTÓN FLOTANTE FE — nuevo efecto
   ══════════════════════════════════════ */
#btnFE{
  position:absolute;bottom:14px;right:12px;
  z-index:600;display:none;
  flex-direction:column;align-items:center;gap:6px;
  background:none;border:none;cursor:pointer;
}
#btnFE:active .bfec{transform:scale(.9)!important}

/* Círculo principal */
.bfec{
  width:54px;height:54px;border-radius:50%;
  background:linear-gradient(135deg,#065f46,#059669 50%,#34d399);
  background-size:200% 200%;
  animation:gradFlow 3s ease infinite, bounceFE 2.8s ease-in-out infinite;
  display:flex;align-items:center;justify-content:center;font-size:24px;
  border:3px solid rgba(255,255,255,.95);
  position:relative;overflow:hidden;
  box-shadow:0 6px 22px rgba(5,150,105,.5), 0 0 0 0 rgba(5,150,105,.3);
  transition:.15s;
}

/* Shimmer sweep sobre el círculo */
.bfec::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(105deg,transparent 35%,rgba(255,255,255,.55) 50%,transparent 65%);
  animation:shimmerSweep 2.4s ease-in-out infinite;
  border-radius:50%;pointer-events:none;
}

/* Halo giratorio de puntos (SVG inline via bg) */
.bfec-halo{
  position:absolute;inset:-10px;border-radius:50%;
  background:transparent;
  animation:spinHalo 4s linear infinite;
  pointer-events:none;
}
.bfec-halo::before,.bfec-halo::after{
  content:'';position:absolute;border-radius:50%;
  width:7px;height:7px;background:#34d399;
  top:50%;left:-1px;transform:translateY(-50%);
  box-shadow:0 0 6px rgba(52,211,153,.8);
}
.bfec-halo::after{
  left:auto;right:-1px;
  background:#10b981;
  box-shadow:0 0 6px rgba(16,185,129,.8);
}

/* Destellos en las esquinas */
.bfec-spark{
  position:absolute;width:5px;height:5px;border-radius:50%;
  background:#fff;pointer-events:none;
}
.bfec-spark:nth-child(1){top:6px;right:8px;animation:sparkle 1.8s ease-in-out infinite 0s}
.bfec-spark:nth-child(2){bottom:7px;left:9px;animation:sparkle 1.8s ease-in-out infinite .6s}
.bfec-spark:nth-child(3){top:50%;right:4px;animation:sparkle 1.8s ease-in-out infinite 1.1s}

/* Etiqueta "Ir a Farma Expertos" */
.bfe-lbl{
  background:linear-gradient(135deg,#065f46,#059669);
  border-radius:99px;
  padding:5px 11px;
  font-family:'Plus Jakarta Sans',sans-serif;
  font-size:9.5px;font-weight:900;
  color:#fff;white-space:nowrap;
  box-shadow:0 3px 12px rgba(5,150,105,.35);
  letter-spacing:.01em;
  position:relative;overflow:hidden;
}
/* Shimmer también en la etiqueta */
.bfe-lbl::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(105deg,transparent 30%,rgba(255,255,255,.3) 50%,transparent 70%);
  animation:shimmerSweep 2.4s ease-in-out infinite .5s;
}

/* Marcador */
.fmk{position:relative;text-align:center;width:56px}
.fmk-r1{position:absolute;inset:-4px;border-radius:50%;animation:ping 2.2s ease-in-out infinite}
.fmk-r2{position:absolute;inset:-14px;border-radius:50%;animation:ping2 2.8s ease-in-out infinite .6s}
.fmk-c{position:relative;width:56px;height:56px;border-radius:50%;border:3px solid rgba(255,255,255,.96);display:flex;align-items:center;justify-content:center;font-size:24px;margin:0 auto;box-shadow:0 8px 26px rgba(0,0,0,.22);animation:floatUp 3.2s ease-in-out infinite}

/* BOTTOM SHEET */
#bs{flex:1;display:flex;flex-direction:column;min-height:0;overflow:hidden;transition:background .4s}
.bsi{flex:1;overflow-y:auto;padding:12px 14px 8px;animation:slideUp .28s cubic-bezier(.22,1,.36,1)}
.bsi::-webkit-scrollbar{display:none}
.bscta-wrap{flex-shrink:0;padding:6px 14px calc(14px + env(safe-area-inset-bottom,0px))}
/* el div hijo directo de #bs también debe ser flex column */
#bs > div{flex:1;display:flex;flex-direction:column;min-height:0;}

/* ── Carousel fotos ── */
.pcc{position:relative;border-radius:14px;overflow:hidden;margin-bottom:7px;touch-action:pan-y}
.pcvp{overflow:hidden;border-radius:14px;width:100%}
.pctr{display:flex;transition:transform .36s cubic-bezier(.22,1,.36,1);will-change:transform}
.pcsl{flex-shrink:0;width:100%;position:relative}
.pcimg{width:100%;height:145px;object-fit:cover;display:block}
.pcov{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.65) 0%,transparent 55%);display:flex;flex-direction:column;justify-content:flex-end;padding:9px 11px}
.pcbadge{display:inline-flex;align-items:center;background:rgba(255,255,255,.2);backdrop-filter:blur(6px);border-radius:99px;padding:2px 8px;font-size:8px;font-weight:800;color:#fff;text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px;width:fit-content}
.pctit{font-size:13px;font-weight:900;color:#fff;line-height:1.2;margin-bottom:1px}
.pcsub{font-size:9.5px;color:rgba(255,255,255,.82);font-weight:500;line-height:1.35}
.pcdots{display:flex;justify-content:center;gap:4px;padding:4px 0 2px}
.pcdot{width:4px;height:4px;border-radius:50%;cursor:pointer;transition:all .22s}
.pcdot.on{width:12px;border-radius:2px}
.pcarr{position:absolute;top:34px;z-index:10;width:22px;height:22px;border-radius:50%;background:rgba(255,255,255,.88);backdrop-filter:blur(8px);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,.15);transition:.12s}
.pcarr:active{transform:scale(.88)}
.pcarr-l{left:7px}.pcarr-r{right:7px}

/* ── Carousel servicios auto ── */
.svwrap{margin-bottom:8px;overflow:hidden;position:relative}
.svwrap::before,.svwrap::after{content:'';position:absolute;top:0;bottom:0;width:20px;z-index:2;pointer-events:none}
.svwrap::before{left:0;background:linear-gradient(to right,var(--svbg),transparent)}
.svwrap::after{right:0;background:linear-gradient(to left,var(--svbg),transparent)}
.svtr{display:flex;gap:6px;animation:scrollX 22s linear infinite;width:max-content;padding:1px 0}
.svtr:hover{animation-play-state:paused}
.svcard{flex-shrink:0;border-radius:10px;padding:6px 9px;display:flex;align-items:center;gap:5px;background:rgba(255,255,255,.75);border:1.5px solid rgba(255,255,255,.65);box-shadow:0 1px 5px rgba(0,0,0,.06)}
.svemo{font-size:14px;flex-shrink:0}
.svname{font-size:10px;font-weight:800;color:#18222e;white-space:nowrap}
.svdesc{font-size:8px;font-weight:600;color:#7a8fa6;white-space:nowrap}

/* Stats */
.bsstats{display:flex;gap:6px;margin-bottom:8px;overflow-x:auto;scrollbar-width:none}
.bsstats::-webkit-scrollbar{display:none}
.bsstat{flex-shrink:0;display:flex;align-items:center;gap:5px;border-radius:99px;padding:5px 10px;white-space:nowrap}
.bsstat-ico{font-size:12px}
.bsstat-val{font-size:11px;font-weight:800}
.bsstat-lbl{font-size:8.5px;font-weight:600;opacity:.6;margin-left:1px}

/* ── Tracker estado pedido ── */
@keyframes trackPulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.65;transform:scale(.92)}}
.trk{border-radius:16px;padding:12px 14px;margin-bottom:8px;border:1.5px solid rgba(5,150,105,.15);background:rgba(255,255,255,.6);backdrop-filter:blur(10px)}
.trk-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.trk-title{font-size:8.5px;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:#059669;opacity:.75}
.trk-eta{font-size:11px;font-weight:700;color:#065f46;background:rgba(5,150,105,.1);border-radius:99px;padding:3px 10px;white-space:nowrap}
.trk-eta b{font-weight:900}
.trk-steps{display:flex;align-items:flex-start;position:relative}
.trk-steps::before{content:'';position:absolute;top:17px;left:22px;right:22px;height:2px;background:rgba(0,0,0,.08);border-radius:2px;z-index:0}
.trk-line{position:absolute;top:17px;left:22px;height:2px;background:linear-gradient(to right,#059669,#34d399);border-radius:2px;z-index:1}
.trk-step{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;position:relative;z-index:2}
.trk-ico{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;border:2.5px solid rgba(255,255,255,.95);transition:.3s}
.trk-ico.done{background:linear-gradient(135deg,#059669,#10b981);box-shadow:0 3px 10px rgba(5,150,105,.35)}
.trk-ico.active{background:linear-gradient(135deg,#059669,#34d399);box-shadow:0 3px 14px rgba(5,150,105,.5);animation:trackPulse 1.8s ease-in-out infinite}
.trk-ico.idle{background:rgba(0,0,0,.06)}
.trk-lbl{font-size:8.5px;font-weight:800;text-align:center;line-height:1.2}
.trk-lbl.done{color:#059669}.trk-lbl.active{color:#059669}.trk-lbl.idle{color:#9aa5ae}
.trk-sub{font-size:7px;font-weight:600;text-align:center;color:#9aa5ae;line-height:1.3;margin-top:1px}

/* CTA */
.bscta{display:flex;gap:8px}
.btnp{flex:1;padding:14px;border-radius:16px;border:none;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;font-weight:800;color:#fff;display:flex;align-items:center;justify-content:center;gap:7px;background-size:200% 200%;animation:gradFlow 3s ease infinite;transition:transform .13s;box-shadow:0 5px 18px rgba(0,0,0,.18)}
.btnp:active{transform:scale(.97)}
.btnm{width:50px;border-radius:14px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:19px;background:#fff;flex-shrink:0;transition:.15s;box-shadow:0 2px 10px rgba(0,0,0,.09)}
.btnm:active{transform:scale(.9)}

/* FE card editorial */
.fecard{border-radius:18px;overflow:hidden;margin-bottom:10px;border:1.5px solid rgba(5,150,105,.15)}
.fectop{padding:14px;display:flex;gap:11px;align-items:flex-start;position:relative;overflow:hidden}
.fect-bg1{position:absolute;width:130px;height:130px;border-radius:50%;top:-40px;right:-25px;pointer-events:none}
.fect-bg2{position:absolute;width:70px;height:70px;border-radius:50%;bottom:-20px;left:-10px;pointer-events:none}
.feico{width:54px;height:54px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;position:relative;z-index:1}
.feico::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.28),transparent 55%);border-radius:16px}
.fetxt{flex:1;min-width:0;position:relative;z-index:1}
.fesupra{font-size:8.5px;font-weight:800;text-transform:uppercase;letter-spacing:.1em;margin-bottom:4px;opacity:.65}
.fetit{font-size:15px;font-weight:900;line-height:1.18;letter-spacing:-.015em;margin-bottom:4px}
.fesub{font-size:10.5px;font-weight:500;line-height:1.5;opacity:.75}
.fechips{display:flex;gap:5px;flex-wrap:wrap;padding:0 14px 11px}
.fechip{font-size:9.5px;font-weight:800;padding:4px 10px;border-radius:99px}
.feclaim{display:flex;align-items:center;gap:9px;padding:9px 14px;border-top:1px solid rgba(5,150,105,.1)}
.feclaim-ico{font-size:15px}
.feclaim-txt{font-size:10.5px;font-weight:700;line-height:1.4}

/* FE servicios grid */
.fesvcs{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:10px}
.fesvc{border-radius:12px;padding:10px 11px;display:flex;align-items:center;gap:7px}
.fesvc-emo{font-size:17px;flex-shrink:0}
.fesvc-name{font-size:11px;font-weight:800;line-height:1.1}
.fesvc-desc{font-size:8.5px;font-weight:600;opacity:.6}
</style>
</head>
<body>
<div id="app">

  <div id="hdr">
    <div class="hr1">
      <button class="hback" onclick="history.back()"><span class="sym f" style="font-size:17px;color:#555">arrow_back</span></button>
      <div class="hemb" id="hemb">🏥</div>
      <div class="htxt">
        <div class="hname" id="hname">Droguería Central</div>
        <div class="hsub" id="hsub">Calle 52 #48-09 · Copacabana</div>
      </div>
      <div class="hpill"><div class="hpill-dot"></div><span class="hpill-txt">Abierta</span></div>
    </div>
    <div class="tabsw">
      <button class="tsw on" id="tsw-central" onclick="go('central',true)"><span style="font-size:13px">🏥</span>Drog. Central</button>
      <button class="tsw" id="tsw-expertos" onclick="go('expertos',true)"><span style="font-size:13px">💊</span>Farma Expertos</button>
    </div>
  </div>

  <div id="mapW">
    <div id="theMap"></div>
    <div id="mchip">
      <div class="mchip-ico">🛵</div>
      <div>
        <div class="mchip-name">Tu domi WIL</div>
        <div class="mchip-sub">Sale en minutos · Copacabana</div>
      </div>
    </div>
    <!-- Botón flotante con nuevo efecto -->
    <button id="btnFE" onclick="go('expertos',true)">
      <div class="bfec">
        <div class="bfec-halo"></div>
        <div class="bfec-spark"></div>
        <div class="bfec-spark"></div>
        <div class="bfec-spark"></div>
        💊
      </div>
      <div class="bfe-lbl">Ir a Farma Expertos</div>
    </button>
  </div>

  <div id="bs"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
var S={
  central:{
    nombre:'Droguería Central',emoji:'🏥',
    dir:'Calle 52 #48-09, Centro',ciudad:'Copacabana, Ant.',
    horario:'7am–10pm · Todos los días',rating:'4.9',entregas:'1.2k',
    lat:6.3485472,lng:-75.5073901,
    gmaps:'https://maps.google.com/?q=6.3485472,-75.5073901',pedido:'central',
    tabBg:'linear-gradient(135deg,#3730a3,#4f46e5)',
    appBg:'#f5f3ff',embBg:'linear-gradient(135deg,#dbeafe,#c7d2fe)',nameColor:'#1e1b4b',
    mBg:'linear-gradient(135deg,#3730a3,#6366f1)',mR1:'rgba(99,102,241,.3)',mR2:'rgba(99,102,241,.1)',mSh:'rgba(99,102,241,.5)',
    bsBg:'linear-gradient(160deg,#f5f3ff,#ede9fe 55%,#ddd6fe)',bsBorder:'rgba(99,102,241,.12)',
    icoBg:'linear-gradient(135deg,#6366f1,#8b5cf6)',
    statBg:'rgba(99,102,241,.09)',statColor:'#3730a3',
    svBg:'#f5f3ff',
    ctaBg:'linear-gradient(135deg,#3730a3,#6366f1 60%,#8b5cf6)',ctaSh:'0 5px 20px rgba(99,102,241,.4)',extBorder:'rgba(99,102,241,.18)',
    dotColor:'#6366f1',
    slides:[

var cur='central',map=null,mk=null,pcIdx=0,pcTotal=0,pcTimer=null;

window.addEventListener('DOMContentLoaded',function(){
  map=L.map('theMap',{center:[S.central.lat,S.central.lng],zoom:17,zoomControl:false,attributionControl:false});
  L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',{maxZoom:20,minZoom:3,subdomains:'abcd',detectRetina:true}).addTo(map);
  L.control.zoom({position:'topright'}).addTo(map);
  var p=new URLSearchParams(window.location.search).get('sede');
  go(p==='expertos'?'expertos':'central',false);
});

function mkIcon(s){
  return L.divIcon({
    html:'<div class="fmk">'
      +'<div class="fmk-r2" style="background:'+s.mR2+'"></div>'
      +'<div class="fmk-r1" style="background:'+s.mR1+'"></div>'
      +'<div class="fmk-c" style="background:'+s.mBg+';box-shadow:0 8px 26px '+s.mSh+'">🛵</div>'
      +'</div>',
    className:'',iconSize:[56,72],iconAnchor:[28,68]
  });
}

function go(id,anim){
  var s=S[id]; cur=id;
  document.getElementById('app').style.background=s.appBg;
  document.getElementById('hemb').style.background=s.embBg;
  document.getElementById('hemb').textContent=s.emoji;
  document.getElementById('hname').textContent=s.nombre;
  document.getElementById('hname').style.color=s.nameColor;
  document.getElementById('hsub').textContent=s.dir+' · '+s.ciudad;
  ['central','expertos'].forEach(function(t){
    var tb=document.getElementById('tsw-'+t);
    if(t===id){tb.classList.add('on');tb.style.background=S[t].tabBg;tb.style.color='#fff';}
    else{tb.classList.remove('on');tb.style.background='transparent';tb.style.color='#9aa5ae';}
  });
  document.getElementById('btnFE').style.display=(id==='central')?'flex':'none';
  if(mk){map.removeLayer(mk);mk=null;}
  mk=L.marker([s.lat,s.lng],{icon:mkIcon(s),zIndexOffset:1000}).addTo(map)
    .bindPopup('<div style="font-family:\'Plus Jakarta Sans\',sans-serif;min-width:165px;padding:2px 0">'
      +'<div style="display:flex;align-items:center;gap:8px;margin-bottom:5px">'
        +'<div style="width:30px;height:30px;border-radius:9px;background:'+s.icoBg+';display:flex;align-items:center;justify-content:center;font-size:15px">'+s.emoji+'</div>'
        +'<div><div style="font-size:12.5px;font-weight:800;color:'+s.nameColor+'">'+s.nombre+'</div>'
          +'<div style="font-size:9.5px;font-weight:700;color:#16a34a">● Abierta</div>'
        +'</div></div>'
      +'<div style="font-size:10px;color:#6b7a8d;line-height:1.4;margin-bottom:3px">'+s.dir+'<br>'+s.ciudad+'</div>'
      +'<div style="font-size:9px;color:#9aa5ae;font-weight:600">⏰ '+s.horario+'</div>'
      +'</div>',{maxWidth:200});
  if(anim) map.flyTo([s.lat,s.lng],17,{duration:.65,easeLinearity:.35});
  else map.setView([s.lat,s.lng],17);
  setTimeout(function(){map.invalidateSize();},80);
  renderBS(s);
}

/* CAROUSEL FOTOS */
function buildCarousel(slides,dotColor){
  pcTotal=slides.length; pcIdx=0;
  if(pcTimer){clearInterval(pcTimer);pcTimer=null;}
  var imgs=slides.map(function(sl,i){
    return '<div class="pcsl"><img class="pcimg" src="'+sl.img+'" loading="'+(i===0?'eager':'lazy')+'" onerror="this.style.display=\'none\'">'
      +'<div class="pcov"><div class="pcbadge">'+sl.badge+'</div><div class="pctit">'+sl.tit+'</div><div class="pcsub">'+sl.sub+'</div></div></div>';
  }).join('');
  var dots=slides.map(function(_,i){
    return '<div class="pcdot'+(i===0?' on':'')+'" style="background:'+(i===0?dotColor:'rgba(0,0,0,.18)')+'" data-i="'+i+'" onclick="pcTo(parseInt(this.dataset.i))"></div>';
  }).join('');
  setTimeout(function(){
    var vp=document.getElementById('pcvp'); if(!vp) return;
    var w=vp.offsetWidth;
    vp.querySelectorAll('.pcsl').forEach(function(sl){sl.style.width=w+'px';});
    var sx=0;
    vp.addEventListener('touchstart',function(e){sx=e.touches[0].clientX;},{passive:true});
    vp.addEventListener('touchend',function(e){var dx=e.changedTouches[0].clientX-sx;if(Math.abs(dx)>38)pcStep(dx<0?1:-1);},{passive:true});
    pcTimer=setInterval(function(){pcStep(1);},3800);
  },80);
  return '<div class="pcc">'
    +'<div class="pcvp" id="pcvp"><div class="pctr" id="pctr">'+imgs+'</div></div>'
    +'<button class="pcarr pcarr-l" onclick="pcStep(-1)"><span class="sym f" style="font-size:13px;color:#333">chevron_left</span></button>'
    +'<button class="pcarr pcarr-r" onclick="pcStep(1)"><span class="sym f" style="font-size:13px;color:#333">chevron_right</span></button>'
    +'<div class="pcdots" id="pcdots">'+dots+'</div>'
    +'</div>';
}
var _dcol='#6366f1';
function pcTo(i){
  pcIdx=i;
  var tr=document.getElementById('pctr'),vp=document.getElementById('pcvp'); if(!tr||!vp) return;
  tr.style.transform='translateX(-'+(vp.offsetWidth*i)+'px)';
  document.querySelectorAll('.pcdot').forEach(function(d,j){
    d.classList.toggle('on',j===i);
    d.style.background=j===i?_dcol:'rgba(0,0,0,.18)';
  });
}
function pcStep(d){pcTo((pcIdx+d+pcTotal)%pcTotal);}

/* RENDER BS */
function renderBS(s){
  if(pcTimer){clearInterval(pcTimer);pcTimer=null;}
  _dcol=s.dotColor;
  var carousel=buildCarousel(s.slides,s.dotColor);

  var stats=
    '<div class="bsstat" style="background:'+s.statBg+'"><span class="bsstat-ico">⭐</span><span class="bsstat-val" style="color:'+s.statColor+'">'+s.rating+'</span><span class="bsstat-lbl" style="color:'+s.statColor+'">rating</span></div>'

    }).join('');
    var fecard='<div class="fecard" style="background:'+s.bsBg+'">'

        +'<div class="fetxt">'

      +'<div class="feclaim" style="background:'+s.feClaimBg+'">'
        +'<span class="feclaim-ico">🛵</span>'
        +'<span class="feclaim-txt" style="color:'+s.feChipColor+'">'+s.feClaim+'</span>'
      +'</div>'
    +'</div>';
    var tracker='<div class="trk">'
      +'<div class="trk-header">'
        +'<span class="trk-title">🛵 Estado de tu domicilio WIL</span>'
        +'<span class="trk-eta">⏱ <b>~12 min</b></span>'
      +'</div>'
      +'<div class="trk-steps">'
        +'<div class="trk-line" style="width:50%"></div>'
        +'<div class="trk-step">'
          +'<div class="trk-ico done">✅</div>'
          +'<div class="trk-lbl done">Recibido</div>'
          +'<div class="trk-sub">Tu pedido<br>ingresó</div>'
        +'</div>'
        +'<div class="trk-step">'
          +'<div class="trk-ico active">🛵</div>'
          +'<div class="trk-lbl active">En camino</div>'
          +'<div class="trk-sub">WIL va<br>hacia ti</div>'
        +'</div>'
        +'<div class="trk-step">'
          +'<div class="trk-ico idle">📦</div>'
          +'<div class="trk-lbl idle">Entregado</div>'
          +'<div class="trk-sub">En tu<br>puerta</div>'
        +'</div>'
      +'</div>'
    +'</div>';
    inner=carousel+tracker;
  }

  var bsEl=document.getElementById('bs');
  bsEl.style.background=s.bsBg;
  bsEl.innerHTML=
    '<div style="border-top:1.5px solid '+s.bsBorder+';flex:1;display:flex;flex-direction:column;min-height:0;">'
    +'<div class="bsi">'+inner+'</div>'
    +'<div class="bscta-wrap" style="background:'+s.bsBg+'">'
      +'<div class="bscta">'
        +'<button class="btnp" style="background:'+s.ctaBg+';box-shadow:'+s.ctaSh+'" onclick="pedir(\''+s.pedido+'\')">'
          +'<span style="font-size:19px">🛒</span> Pedir aquí ahora'
        +'</button>'
        +'<button class="btnm" style="border:1.5px solid '+s.extBorder+'" onclick="openMaps(\''+s.gmaps+'\')">'
          +'🗺️'
        +'</button>'
      +'</div>'
    +'</div>'
    +'</div>';
}
