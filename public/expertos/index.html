<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&display=swap" rel="stylesheet"/>
<script id="tailwind-config">
tailwind.config = {
    darkMode: "class",
    theme: {
        extend: {
            colors: {
                "primary": "#007a33",
                "background-light": "#f8f6f6",
                "background-dark": "#121212",
            },
            fontFamily: {
                "display": ["Public Sans"]
            },
            screens: {
                'xs': '475px',
            }
        },
    },
}
</script>
<style>
body { font-family: 'Public Sans', sans-serif; }
.material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
.line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
@media (max-width: 640px) {
    .mobile-header { padding: 0.5rem 1rem !important; }
    .mobile-py { padding-top: 1rem !important; padding-bottom: 1rem !important; }
    .cart-w-xs { max-width: 95vw !important; }
}
</style>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100">

<!-- Top Bar -->
<div class="bg-primary text-white py-2 px-4 text-center text-xs font-medium">
    🚚 Envío gratis > $30.000 | Copacabana & Barrios Cercanos
</div>

<!-- Header Mobile-First -->
<header class="sticky top-0 z-50 bg-white/95 dark:bg-background-dark/95 backdrop-blur-md border-b border-slate-200 dark:border-slate-800 shadow-sm">
<div class="max-w-4xl mx-auto px-3 sm:px-4 lg:px-8 py-3 mobile-header">
<div class="flex items-center justify-between">
<!-- Logo Mobile -->
<div class="flex items-center gap-2 shrink-0" onclick="window.scrollTo(0,0)">
<div class="bg-primary p-2 rounded-lg text-white">
<span class="material-symbols-outlined text-2xl">medical_services</span>
</div>
<div class="hidden sm:block">
<span class="text-xl font-bold tracking-tight text-primary leading-none">FarmaExpertos</span>
<span class="text-[8px] font-bold tracking-[0.2em] text-slate-500 uppercase block">La Pedrera, Copacabana</span>
</div>
<div class="sm:hidden">
<span class="text-lg font-bold text-primary">Farma</span>
</div>
</div>

<!-- Mobile Actions -->
<div class="flex items-center gap-2">
<button class="p-2 text-slate-600 dark:text-slate-300 hover:text-primary" onclick="toggleForm()">
<span class="material-symbols-outlined text-xl">add</span>
</button>
<button class="relative p-2 bg-primary text-white rounded-xl hover:bg-primary/90" onclick="toggleCart()">
<span class="material-symbols-outlined text-xl">shopping_cart</span>
<span class="absolute -top-1 -right-1 bg-red-500 text-[8px] w-4 h-4 flex items-center justify-center rounded-full border-2 border-white" id="mobile-cart-count">0</span>
</button>
</div>
</div>
</div>
</header>

<!-- Nuevo Pedido Modal MOBILE -->
<div id="order-form" class="fixed inset-0 bg-black/70 z-[100] hidden flex items-center justify-center p-4">
<div class="bg-white dark:bg-slate-900 rounded-2xl w-full max-w-md cart-w-xs max-h-[95vh] overflow-hidden flex flex-col">
<div class="p-6 border-b border-slate-200 dark:border-slate-800 flex items-center justify-between">
<h2 class="text-xl font-bold text-slate-800 dark:text-slate-100 flex-1">📋 Nuevo Pedido</h2>
<button class="text-slate-400 hover:text-slate-600 p-1" onclick="toggleForm()">
<span class="material-symbols-outlined text-xl">close</span>
</button>
</div>
<div class="flex-1 overflow-y-auto p-6 space-y-4">
<form id="orderForm">
<div>
<label class="block text-sm font-semibold mb-2 text-slate-700 dark:text-slate-200">👤 Nombre Cliente</label>
<input type="text" id="nombre_cli" class="w-full px-4 py-3 border border-slate-200 dark:border-slate-700 rounded-xl focus:ring-2 focus:ring-primary/50 bg-white dark:bg-slate-800" required>
</div>
<div>
<label class="block text-sm font-semibold mb-2 text-slate-700 dark:text-slate-200">📱 Teléfono</label>
<input type="tel" id="telefono" class="w-full px-4 py-3 border border-slate-200 dark:border-slate-700 rounded-xl focus:ring-2 focus:ring-primary/50 bg-white dark:bg-slate-800" required>
</div>
<div>
<label class="block text-sm font-semibold mb-2 text-slate-700 dark:text-slate-200">📍 Dirección Completa</label>
<input type="text" id="direccion" class="w-full px-4 py-3 border border-slate-200 dark:border-slate-700 rounded-xl focus:ring-2 focus:ring-primary/50 bg-white dark:bg-slate-800" placeholder="Calle 10 #20-30, Barrio Los Alpes" required>
</div>
<div>
<label class="block text-sm font-semibold mb-2 text-slate-700 dark:text-slate-200">💳 Método Pago</label>
<select id="metodo_pago" class="w-full px-4 py-3 border border-slate-200 dark:border-slate-700 rounded-xl focus:ring-2 focus:ring-primary/50 bg-white dark:bg-slate-800">
<option value="CONTRA_ENTREGA">💰 Contra Entrega</option>
<option value="TRANSFERENCIA">🏦 Transferencia</option>
</select>
</div>
<div>
<label class="block text-sm font-semibold mb-2 text-slate-700 dark:text-slate-200">🛒 Productos del Carrito</label>
<div id="mobile-cart-preview" class="space-y-2 p-4 bg-slate-50 dark:bg-slate-800 rounded-xl max-h-32 overflow-y-auto"></div>
</div>
</form>
</div>
<div class="p-6 bg-gradient-to-r from-primary to-green-700 border-t">
<button type="submit" form="orderForm" onclick="saveOrderToSheet()" class="w-full bg-white text-primary py-4 rounded-xl font-bold text-lg shadow-xl">
🚀 ENVIAR A "Pedidos" Sheet
</button>
</div>
</div>
</div>

<!-- Main Content -->
<main class="max-w-4xl mx-auto px-3 sm:px-4 lg:px-8 mobile-py">
<!-- Mobile Tabs -->
<div class="flex bg-white dark:bg-slate-900 rounded-xl p-1 mb-6 shadow-sm border">
<button id="stock-tab" onclick="switchTab('stock')" class="flex-1 py-3 px-4 rounded-lg font-bold text-sm text-primary bg-primary/10">💊 Stock</button>
<button id="pedidos-tab" onclick="switchTab('pedidos')" class="flex-1 py-3 px-4 rounded-lg font-bold text-sm text-slate-600 dark:text-slate-300">📋 Pedidos</button>
</div>

<!-- Stock Section -->
<section id="stock-section" class="block">
<div class="flex items-center justify-between mb-6">
<h2 class="text-2xl font-bold text-slate-800 dark:text-slate-100">STOCK_DROGUERIA_EXPERTOS</h2>
<button onclick="loadStock()" class="text-primary text-sm font-bold flex items-center gap-1 p-2 rounded-lg bg-primary/10">
<span class="material-symbols-outlined">refresh</span> Actualizar
</button>
</div>
<div id="stock-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
<!-- Cards dinámicas MOBILE FIRST -->
</div>
</section>

<!-- Pedidos Section -->
<section id="pedidos-section" class="hidden">
<div class="flex items-center justify-between mb-6">
<h2 class="text-2xl font-bold text-slate-800 dark:text-slate-100">📋 Pedidos Recientes</h2>
<button onclick="loadPedidos()" class="text-primary text-sm font-bold flex items-center gap-1 p-2 rounded-lg bg-primary/10">
<span class="material-symbols-outlined">refresh</span> Actualizar
</button>
</div>
<div id="pedidos-list" class="space-y-4">
<!-- Lista pedidos responsive -->
</div>
</section>
</main>

<!-- Carrito Modal OPTIMIZADO MÓVIL -->
<div class="fixed inset-0 bg-black/70 z-[90] hidden transition-opacity duration-300" id="cart-overlay"></div>
<div class="fixed top-0 right-0 h-full w-full max-w-sm cart-w-xs bg-white dark:bg-slate-900 z-[95] shadow-2xl transform translate-x-full transition-transform duration-300 flex flex-col" id="cart-panel">
<div class="p-6 border-b border-slate-200 dark:border-slate-800 flex items-center justify-between">
<h2 class="text-xl font-bold text-slate-800 dark:text-slate-100">🛒 Tu Carrito</h2>
<button class="text-slate-400 hover:text-slate-600 p-1" id="close-cart">
<span class="material-symbols-outlined text-xl">close</span>
</button>
</div>
<div class="flex-1 overflow-y-auto p-6 space-y-4">
<div id="cart-items"></div>
<button onclick="toggleForm()" class="w-full p-3 bg-blue-500 text-white rounded-xl font-bold text-sm flex items-center justify-center gap-2">
<span class="material-symbols-outlined">add</span> Completar Datos Cliente
</button>
</div>
<div class="p-6 bg-gradient-to-r from-primary to-green-700 border-t">
<div class="flex items-center justify-between mb-4 text-lg font-bold text-white">
<span>Total:</span>
<span id="cart-total-big">$0</span>
</div>
<button onclick="saveOrderToSheet()" id="save-btn" class="w-full bg-white text-primary py-4 rounded-xl font-bold text-lg shadow-xl hover:scale-[1.02] transition-all">
✅ GUARDAR EN "Pedidos"
</button>
<p class="text-xs text-white/80 text-center mt-2 font-bold tracking-wider">Se envía a Google Sheet automáticamente</p>
</div>
</div>

<script>
// DATOS REALES STOCK_DROGUERIA_EXPERTOS (simulación - reemplaza con API)
const STOCK_DROGUERIA_EXPERTOS = [
    {descripcion: "Redoxon Vitamina C 1000mg Efervescente", laboratorio: "BAYER", unidad: "", precio: "$12.790", precio_unitario: "$426"},
    {descripcion: "Anthelios UVMune 400 FPS50+ Fluido", laboratorio: "LA ROCHE-POSAY", unidad: "", precio: "$19.590", precio_unitario: "$392"},
    {descripcion: "Premium Care Talla G 56 Unidades", laboratorio: "PAMPERS", unidad: "", precio: "$18.840", precio_unitario: "$336"},
    {descripcion: "DermoCapillaire Shampoo pH5", laboratorio: "EUCERIN", unidad: "", precio: "$11.430", precio_unitario: "$46"},
    {descripcion: "Paracetamol 1g Tabletas", laboratorio: "QUALA", unidad: "", precio: "$2.500", precio_unitario: "$250"},
    {descripcion: "Ibuprofeno 400mg", laboratorio: "ANKAL", unidad: "", precio: "$4.800", precio_unitario: "$240"},
    {descripcion: "Omeprazol 20mg", laboratorio: "MAGISTER", unidad: "", precio: "$8.900", precio_unitario: "$89"},
    {descripcion: "Cetirizina 10mg", laboratorio: "BAGO", unidad: "", precio: "$3.200", precio_unitario: "$32"}
];

let cart = [];
let currentTab = 'stock';

// Mobile-First Functions
function switchTab(tab) {
    currentTab = tab;
    document.getElementById('stock-section').classList.toggle('hidden', tab !== 'stock');
    document.getElementById('pedidos-section').classList.toggle('hidden', tab !== 'pedidos');
    
    document.getElementById('stock-tab').classList.toggle('bg-primary/10', tab === 'stock');
    document.getElementById('stock-tab').classList.toggle('text-primary', tab === 'stock');
    document.getElementById('pedidos-tab').classList.toggle('bg-primary/10', tab === 'pedidos');
    document.getElementById('pedidos-tab').classList.toggle('text-primary', tab === 'pedidos');
}

function toggleCart() {
    document.getElementById('cart-overlay').classList.remove('hidden');
    document.getElementById('cart-panel').classList.remove('translate-x-full');
}

function toggleForm() {
    document.getElementById('order-form').classList.toggle('hidden');
}

document.getElementById('close-cart').onclick = closeCart;
document.getElementById('cart-overlay').onclick = closeCart;

function closeCart() {
    document.getElementById('cart-panel').classList.add('translate-x-full');
    setTimeout(() => document.getElementById('cart-overlay').classList.add('hidden'), 300);
}

// CARGAR STOCK desde STOCK_DROGUERIA_EXPERTOS
function loadStock() {
    switchTab('stock');
    const grid = document.getElementById('stock-grid');
    grid.innerHTML = '';
    
    STOCK_DROGUERIA_EXPERTOS.forEach((item, index) => {
        const card = document.createElement('div');
        card.className = 'bg-white dark:bg-slate-900 p-4 sm:p-5 rounded-2xl border border-slate-200 dark:border-slate-800 flex flex-col group hover:shadow-2xl hover:scale-[1.02] transition-all cursor-pointer h-full';
        card.onclick = () => addToCart(item);
        card.innerHTML = `
            <div class="relative aspect-square bg-gradient-to-br from-slate-50 to-slate-100 dark:from-slate-800 dark:to-slate-900 rounded-xl overflow-hidden mb-4 flex items-center justify-center">
                <span class="material-symbols-outlined text-4xl text-primary group-hover:scale-110 transition-transform">medication</span>
            </div>
            <div class="flex flex-col flex-1 space-y-2">
                <span class="text-[10px] sm:text-xs font-bold text-slate-400 uppercase tracking-wider">${item.laboratorio}</span>
                <h3 class="text-sm sm:text-base font-semibold text-slate-800 dark:text-slate-200 line-clamp-2 leading-tight">${item.descripcion}</h3>
                <div class="mt-auto space-y-1">
                    ${item.unidad ? `<p class="text-xs text-slate-500">${item.unidad}</p>` : ''}
                    <p class="text-lg sm:text-xl font-bold text-primary">${item.precio}</p>
                    <p class="text-xs text-slate-500">Unit: ${item.precio_unitario}</p>
                </div>
                <button class="w-full mt-3 bg-primary text-white py-2 sm:py-2.5 rounded-xl text-xs sm:text-sm font-bold opacity-0 group-hover:opacity-100 transition-all flex items-center justify-center gap-2 shadow-lg">
                    <span class="material-symbols-outlined">add_shopping_cart</span> Agregar
                </button>
            </div>
        `;
        grid.appendChild(card);
    });
    
    updateMobileCartPreview();
}

// AGREGAR AL CARRITO
function addToCart(product) {
    const existing = cart.find(item => item.descripcion === product.descripcion);
    if (existing) {
        existing.cantidad += 1;
    } else {
        cart.push({...product, cantidad: 1});
    }
    updateCartDisplay();
    updateMobileCartPreview();
}

function updateCartDisplay() {
    const count = cart.reduce((sum, item) => sum + (item.cantidad || 0), 0);
    document.getElementById('cart-count').textContent = count;
    document.getElementById('mobile-cart-count').textContent = count;
    
    const cartItems = document.getElementById('cart-items');
    const cartTotal = document.getElementById('cart-total');
    const cartTotalBig = document.getElementById('cart-total-big');
    
    if (cart.length === 0) {
        cartItems.innerHTML = '<div class="text-center py-12"><span class="material-symbols-outlined text-6xl text-slate-400 block mx-auto mb-4">shopping_cart</span><p class="text-slate-500 text-lg">Carrito vacío</p></div>';
        cartTotal.textContent = '$0';
        cartTotalBig.textContent = '$0';
        document.getElementById('save-btn').disabled = true;
        return;
    }
    
    document.getElementById('save-btn').disabled = false;
    
    cartItems.innerHTML = cart.map(item => `
        <div class="flex gap-3 p-4 bg-slate-50 dark:bg-slate-800 rounded-xl items-center">
            <div class="w-14 h-14 bg-gradient-to-br from-primary/10 to-green-500/10 rounded-xl flex items-center justify-center flex-shrink-0">
                <span class="material-symbols-outlined text-xl text-primary">medication</span>
            </div>
            <div class="flex-1 min-w-0">
                <h4 class="font-semibold text-slate-800 dark:text-slate-100 text-sm leading-tight truncate">${item.descripcion}</h4>
                <p class="text-xs text-slate-500">x${item.cantidad || 1}</p>
            </div>
            <div class="text-right">
                <p class="font-bold text-primary text-sm">${item.precio}</p>
                <button onclick="removeFromCart('${item.descripcion}'); event.stopPropagation();" class="ml-2 p-1 text-red-500 hover:text-red-700">
                    <span class="material-symbols-outlined text-lg">delete</span>
                </button>
            </div>
        </div>
    `).join('');
    
    const total = cart.reduce((sum, item) => sum + parseFloat(item.precio.replace(/[$,]/g, '')) * (item.cantidad || 1), 0);
    cartTotal.textContent = `$${total.toLocaleString()}`;
    cartTotalBig.textContent = `$${total.toLocaleString()}`;
}

function updateMobileCartPreview() {
    const preview = document.getElementById('mobile-cart-preview');
    if (cart.length === 0) {
        preview.innerHTML = '<p class="text-xs text-slate-500 text-center py-2">Carrito vacío</p>';
        return;
    }
    preview.innerHTML = cart.slice(0, 3).map(item => `
        <div class="flex items-center gap-2 p-2 bg-white dark:bg-slate-700 rounded-lg">
            <div class="w-8 h-8 bg-primary/20 rounded flex items-center justify-center">
                <span class="material-symbols-outlined text-sm text-primary">💊</span>
            </div>
            <div class="flex-1 min-w-0">
                <p class="text-xs font-medium truncate">${item.descripcion.split(' ')[0]}</p>
                <p class="text-xs text-primary font-bold">${item.precio}</p>
            </div>
        </div>
    `).join('') + (cart.length > 3 ? `<p class="text-xs text-center text-slate-500 py-2">+${cart.length-3} más</p>` : '');
}

function removeFromCart(descripcion) {
    cart = cart.filter(item => item.descripcion !== descripcion);
    updateCartDisplay();
    updateMobileCartPreview();
}

// GUARDAR EN GOOGLE SHEET "Pedidos"
async function saveOrderToSheet() {
    if (cart.length === 0) {
        alert('❌ Carrito vacío');
        return;
    }
    
    const formData = {
        ID_PEDIDO: 'PED' + Date.now(),
        NOMBRE_CLI: document.getElementById('nombre_cli')?.value || 'Cliente Web',
        TELEFONO: document.getElementById('telefono')?.value || '',
        METODO_PAGO: document.getElementById('metodo_pago')?.value || 'CONTRA_ENTREGA',
        ESTADO: 'PENDIENTE',
        IMAGEN_TRANSFERENCIA: '',
        PRODUCTOS: cart.map(p => p.descripcion).join(', '),
        MARCA: cart.map(p => p.laboratorio).join(', '),
        CANTIDAD: cart.map(p => p.cantidad || 1).join(', '),
        'V/U': cart.map(p => p.precio_unitario).join(', '),
        'V/TOTAL': cart.map(p => `x${p.cantidad || 1} ${p.precio}`).join(', '),
        DIRECCION: document.getElementById('direccion')?.value || '',
        HORA: new Date().toLocaleTimeString('es-CO'),
        FECHA: new Date().toLocaleDateString('es-CO'),
        TOTAL: document.getElementById('cart-total-big').textContent
    };
    
    // SIMULACIÓN GOOGLE SHEETS API - Reemplaza con tu endpoint Node.js
    console.log('📤 ENVIANDO A GOOGLE SHEET "Pedidos":', formData);
    
    // FETCH A TU BOT TELEGRAM NODE.JS
    try {
        const response = await fetch('TU_ENDPOINT_NODEJS', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(formData)
        });
        
        if (response.ok) {
            alert(`✅ Pedido ${formData.ID_PEDIDO} \n📱 Enviado a "Pedidos" Sheet!\n💰 Total: ${formData.TOTAL}`);
            cart = [];
            updateCartDisplay();
            updateMobileCartPreview();
            closeCart();
            toggleForm();
            document.getElementById('orderForm').reset();
        }
    } catch(e) {
        alert(`✅ SIMULADO: Pedido ${formData.ID_PEDIDO} guardado en "Pedidos"\n💰 Total: ${formData.TOTAL}\n\n🔗 Conecta con tu Node.js + Google Sheets API`);
    }
}

// CARGAR PEDIDOS (simulación)
function loadPedidos() {
    switchTab('pedidos');
    const list = document.getElementById('pedidos-list');
    list.innerHTML = `
        <div class="bg-gradient-to-r from-slate-50 to-slate-100 dark:from-slate-800 dark:to-slate-900 p-8 rounded-2xl text-center border-2 border-dashed border-slate-300 dark:border-slate-700">
            <span class="material-symbols-outlined text-6xl text-slate-400 mb-4 block mx-auto">assignment</span>
            <h3 class="text-xl font-bold mb-2 text-slate-700 dark:text-slate-200">Pedidos en Google Sheet</h3>
            <p class="text-slate-500 text-sm mb-4">Se cargan desde hoja "Pedidos"</p>
            <p class="text-xs text-slate-400">ID_PEDIDO | NOMBRE_CLI | TOTAL | ESTADO</p>
        </div>
    `;
}

// INICIALIZAR
loadStock();
updateCartDisplay();

// FORM SUBMIT
document.getElementById('orderForm').onsubmit = (e) => {
    e.preventDefault();
    saveOrderToSheet();
};
</script>

</body>
</html>
