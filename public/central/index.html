<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<meta name="theme-color" content="#1a0a2e"/>
<title>Droguería La Central · Copacabana</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,500;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg:    #fdf8f0;
  --bg2:   #f5ede0;
  --bg3:   #ede0cc;
  --ink:   #1a0a00;
  --ink2:  #6b4c2a;
  --red:   #b91c1c;
  --gold:  #92400e;
  --teal:  #0f766e;
  --warm:  #c2410c;
  --border:#d6c4a8;
  --r:     12px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body {
  font-family:'DM Sans',sans-serif;
  background:var(--bg);
  color:var(--ink);
  min-height:100vh;
}

/* NOISE TEXTURE */
body::before {
  content:'';
  position:fixed;inset:0;pointer-events:none;z-index:0;
  opacity:.025;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
}

/* ═══ HEADER ═══ */
header {
  position:sticky; top:0; z-index:100;
  background:rgba(253,248,240,0.88);
  backdrop-filter:blur(20px);
  border-bottom:2px solid var(--border);
}
.hdr {
  max-width:1200px; margin:0 auto; padding:0 20px;
  height:68px; display:flex; align-items:center; justify-content:space-between; gap:12px;
}
.logo { display:flex; align-items:center; gap:12px; text-decoration:none }
.logo-cross {
  width:44px; height:44px; border-radius:10px; flex-shrink:0;
  background:var(--red); display:grid; place-items:center;
  font-size:24px; color:#fff;
  box-shadow:0 4px 16px rgba(185,28,28,.25);
}
.logo-nm {
  font-family:'Libre Baskerville',serif;
  font-size:16px; font-weight:700; color:var(--ink); display:block;
}
.logo-city { font-size:10px; color:var(--ink2); letter-spacing:2px; text-transform:uppercase }
.cart-btn {
  display:flex; align-items:center; gap:8px;
  padding:9px 18px; border-radius:50px;
  background:var(--ink); color:#fdf8f0;
  font-size:13px; font-weight:600; border:none; cursor:pointer; transition:.2s;
  position:relative;
}
.cart-btn:hover { background:var(--red) }
.c-badge {
  position:absolute; top:-5px; right:-5px;
  width:18px; height:18px; border-radius:50%;
  background:var(--warm); color:#fff; font-size:10px; font-weight:800;
  display:grid; place-items:center;
  opacity:0; transform:scale(.3); transition:.2s;
}
.c-badge.on { opacity:1; transform:scale(1) }

/* ═══ HERO ═══ */
.hero {
  position:relative; z-index:1;
  max-width:1200px; margin:0 auto;
  padding:56px 20px 36px;
  display:grid; grid-template-columns:1fr auto; gap:40px; align-items:center;
}
.hero-text .eyebrow {
  font-size:11px; font-weight:600; letter-spacing:3px; text-transform:uppercase;
  color:var(--red); margin-bottom:14px; display:flex; align-items:center; gap:8px;
}
.hero-text .eyebrow::before {
  content:''; width:24px; height:2px; background:var(--red); display:block;
}
.hero-text h1 {
  font-family:'Libre Baskerville',serif;
  font-size:clamp(30px,5vw,52px); font-weight:700; line-height:1.1;
  margin-bottom:10px; color:var(--ink);
}
.hero-text h1 em {
  font-style:italic; font-weight:400; color:var(--red);
}
.hero-text p { font-size:15px; color:var(--ink2); margin-bottom:28px }
.search-box {
  position:relative; max-width:500px;
}
.search-box input {
  width:100%; padding:13px 44px 13px 48px;
  background:#fff; border:2px solid var(--border);
  border-radius:50px; color:var(--ink);
  font-size:15px; font-family:'DM Sans',sans-serif; outline:none; transition:.25s;
  box-shadow:0 2px 12px rgba(0,0,0,.06);
}
.search-box input:focus { border-color:var(--red); box-shadow:0 2px 20px rgba(185,28,28,.12) }
.search-box input::placeholder { color:var(--ink2) }
.s-ico { position:absolute; left:16px; top:50%; transform:translateY(-50%); font-size:18px; pointer-events:none }
.s-clr { position:absolute; right:14px; top:50%; transform:translateY(-50%);
  background:none; border:none; color:var(--ink2); cursor:pointer; font-size:18px; display:none }
.hero-badge {
  background:var(--bg2); border:2px solid var(--border); border-radius:20px;
  padding:28px 24px; text-align:center; flex-shrink:0;
}
.hero-badge .num {
  font-family:'Libre Baskerville',serif; font-size:40px; font-weight:700; color:var(--red);
}
.hero-badge .lbl { font-size:12px; color:var(--ink2); margin-top:4px }

/* ═══ FILTERS ═══ */
.filter-bar {
  position:relative; z-index:1;
  max-width:1200px; margin:0 auto;
  padding:0 20px 20px;
  display:flex; gap:8px; align-items:center; flex-wrap:wrap;
}
.chip {
  padding:6px 16px; border-radius:50px;
  background:#fff; border:1.5px solid var(--border);
  font-size:12px; font-weight:600; color:var(--ink2); cursor:pointer; transition:.2s;
  white-space:nowrap;
}
.chip:hover { border-color:var(--red); color:var(--red) }
.chip.on { background:var(--red); border-color:var(--red); color:#fff }
.cnt { margin-left:auto; font-size:12px; color:var(--ink2) }

/* ═══ GRID ═══ */
.grid {
  position:relative; z-index:1;
  max-width:1200px; margin:0 auto;
  padding:0 20px 120px;
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(188px,1fr));
  gap:14px;
}

/* ═══ CARD ═══ */
.card {
  background:#fff; border:1.5px solid var(--border);
  border-radius:var(--r); overflow:hidden;
  display:flex; flex-direction:column;
  transition:transform .25s, box-shadow .25s, border-color .25s;
  cursor:pointer;
}
.card:hover {
  transform:translateY(-4px);
  box-shadow:0 12px 32px rgba(0,0,0,.1);
  border-color:rgba(185,28,28,.25);
}
.card-pic {
  height:100px; flex-shrink:0;
  display:grid; place-items:center; font-size:40px;
  background:var(--bg2); border-bottom:1.5px solid var(--border);
}
.card-body { padding:14px; flex:1; display:flex; flex-direction:column; gap:5px }
.card-nm {
  font-family:'Libre Baskerville',serif;
  font-size:13px; font-weight:700; line-height:1.3;
  display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;
}
.card-lab { font-size:11px; color:var(--ink2); text-transform:uppercase; letter-spacing:.5px }
.card-unit { font-size:11px; color:var(--ink2) }
.card-foot {
  margin-top:auto; padding-top:12px;
  display:flex; align-items:center; justify-content:space-between; gap:6px;
}
.card-pr {
  font-family:'Libre Baskerville',serif;
  font-size:20px; font-weight:700; color:var(--red);
}
.card-pr2 { font-size:10px; color:var(--ink2) }
.add-btn {
  width:34px; height:34px; flex-shrink:0; border-radius:8px;
  background:var(--ink); color:#fff; border:none;
  font-size:22px; display:grid; place-items:center;
  cursor:pointer; transition:.2s;
}
.add-btn:hover { background:var(--red) }
.add-btn:active { transform:scale(.9) }

.state {
  grid-column:1/-1; text-align:center; padding:80px 20px; color:var(--ink2);
}
.spin {
  width:40px; height:40px; margin:0 auto 16px;
  border:3px solid var(--border); border-top-color:var(--red);
  border-radius:50%; animation:spin .7s linear infinite;
}
@keyframes spin { to { transform:rotate(360deg) } }

/* ═══ DRAWER ═══ */
.shade {
  position:fixed; inset:0; background:rgba(0,0,0,.4); z-index:200;
  opacity:0; pointer-events:none; transition:.3s;
}
.shade.open { opacity:1; pointer-events:all }
.drawer {
  position:fixed; right:0; top:0; bottom:0; z-index:201;
  width:min(440px,100vw);
  background:var(--bg);
  border-left:2px solid var(--border);
  display:flex; flex-direction:column;
  transform:translateX(110%); transition:.35s cubic-bezier(.4,0,.2,1);
}
.drawer.open { transform:translateX(0) }
.drw-hd {
  padding:20px; border-bottom:2px solid var(--border);
  display:flex; align-items:center; justify-content:space-between;
}
.drw-hd h2 {
  font-family:'Libre Baskerville',serif; font-size:20px; font-weight:700;
}
.drw-x {
  width:34px; height:34px; border-radius:8px;
  background:var(--bg2); border:1.5px solid var(--border);
  color:var(--ink2); cursor:pointer; font-size:20px;
  display:grid; place-items:center; transition:.15s;
}
.drw-x:hover { color:var(--red); border-color:rgba(185,28,28,.3) }
.drw-body { flex:1; overflow-y:auto; padding:16px }
.drw-mt {
  text-align:center; padding:60px 20px;
  font-family:'Libre Baskerville',serif; font-style:italic; color:var(--ink2);
}
.drw-mt .big { font-size:48px; margin-bottom:12px }
.ci {
  display:flex; align-items:center; gap:12px;
  padding:12px 0; border-bottom:1.5px solid var(--border);
}
.ci:last-child { border-bottom:none }
.ci-ico {
  width:46px; height:46px; flex-shrink:0; border-radius:10px;
  background:var(--bg2); display:grid; place-items:center; font-size:22px;
}
.ci-inf { flex:1; min-width:0 }
.ci-nm { font-family:'Libre Baskerville',serif; font-size:13px; font-weight:700;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis }
.ci-pr { font-size:12px; color:var(--red); margin-top:2px }
.qty { display:flex; align-items:center; gap:6px; flex-shrink:0 }
.q-btn {
  width:28px; height:28px; border-radius:6px;
  background:var(--bg2); border:1.5px solid var(--border);
  color:var(--ink); cursor:pointer; font-size:17px;
  display:grid; place-items:center; transition:.15s;
}
.q-btn:hover { background:var(--ink); color:#fff; border-color:var(--ink) }
.q-num { font-family:'Libre Baskerville',serif; font-size:15px; font-weight:700; min-width:22px; text-align:center }
.ci-del { background:none; border:none; color:var(--ink2); cursor:pointer; font-size:17px; padding:4px; transition:.15s }
.ci-del:hover { color:var(--red) }

.drw-ft { padding:16px; border-top:2px solid var(--border) }
.tot { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:16px }
.tot-l { font-size:13px; color:var(--ink2) }
.tot-v { font-family:'Libre Baskerville',serif; font-size:28px; font-weight:700; color:var(--red) }

.form { display:flex; flex-direction:column; gap:10px }
.r2   { display:grid; grid-template-columns:1fr 1fr; gap:10px }
.fld  { display:flex; flex-direction:column; gap:4px }
.fld label {
  font-size:10px; font-weight:700; letter-spacing:1px; text-transform:uppercase; color:var(--ink2);
}
.fld input, .fld select {
  padding:11px 14px; background:#fff; border:1.5px solid var(--border);
  border-radius:8px; color:var(--ink);
  font-size:14px; font-family:'DM Sans',sans-serif; outline:none; transition:.2s;
}
.fld input:focus, .fld select:focus { border-color:var(--red) }
.fld input::placeholder { color:var(--ink2) }
.fld select option { background:var(--bg) }
.sbtn {
  padding:15px; border-radius:10px; border:none;
  background:var(--ink); color:var(--bg);
  font-size:15px; font-weight:700;
  font-family:'DM Sans',sans-serif;
  cursor:pointer; transition:.2s;
  box-shadow:0 4px 16px rgba(0,0,0,.15);
}
.sbtn:hover { background:var(--red); box-shadow:0 6px 20px rgba(185,28,28,.3) }
.sbtn:disabled { opacity:.5; cursor:not-allowed }

/* TOAST */
.toast {
  position:fixed; bottom:20px; left:50%;
  transform:translateX(-50%) translateY(60px);
  z-index:400; pointer-events:none;
  background:var(--ink); color:var(--bg); padding:12px 22px; border-radius:50px;
  font-size:13px; font-weight:600; transition:.3s; white-space:nowrap;
  box-shadow:0 8px 24px rgba(0,0,0,.2);
}
.toast.show { transform:translateX(-50%) translateY(0) }

@media(max-width:640px){
  .hero { grid-template-columns:1fr; }
  .hero-badge { display:none }
  .grid { grid-template-columns:repeat(2,1fr); gap:10px }
  .card-pic { height:82px; font-size:34px }
  .r2 { grid-template-columns:1fr }
}
@keyframes up { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:none} }
.card { animation:up .32s ease both }
</style>
</head>
<body>

<header>
  <div class="hdr">
    <a class="logo" href="#">
      <div class="logo-cross">✚</div>
      <div>
        <span class="logo-nm">Droguería La Central</span>
        <span class="logo-city">Copacabana · Antioquia</span>
      </div>
    </a>
    <button class="cart-btn" onclick="openDrawer()">
      🛒 <span id="cartLbl">Carrito</span>
      <span class="c-badge" id="cBadge">0</span>
    </button>
  </div>
</header>

<section class="hero">
  <div class="hero-text">
    <div class="eyebrow">Domicilio rápido</div>
    <h1>Tu farmacia<br/>de confianza,<br/><em>en tu puerta</em></h1>
    <p>Medicamentos · Salud · Bienestar<br/>Copacabana, Antioquia</p>
    <div class="search-box">
      <span class="s-ico">🔍</span>
      <input id="q" type="text" placeholder="Buscar medicamento o laboratorio…"
             oninput="onSrch(this.value)"/>
      <button class="s-clr" id="sClr" onclick="clrQ()">✕</button>
    </div>
  </div>
  <div class="hero-badge">
    <div class="num" id="heroNum">—</div>
    <div class="lbl">productos<br/>disponibles</div>
  </div>
</section>

<div class="filter-bar" id="fBar">
  <button class="chip on" onclick="setLab('',this)">Todos</button>
  <span class="cnt" id="cntLbl"></span>
</div>

<div class="grid" id="grid">
  <div class="state"><div class="spin"></div><p>Cargando productos…</p></div>
</div>

<div class="shade" id="shade" onclick="closeDrawer()"></div>
<aside class="drawer" id="drawer">
  <div class="drw-hd">
    <h2>Tu pedido 🛒</h2>
    <button class="drw-x" onclick="closeDrawer()">✕</button>
  </div>
  <div class="drw-body" id="drwBody">
    <div class="drw-mt"><div class="big">🧺</div><p>Tu carrito está vacío</p></div>
  </div>
  <div class="drw-ft" id="drwFt" style="display:none">
    <div class="tot">
      <span class="tot-l">Total estimado</span>
      <span class="tot-v" id="totV">$0</span>
    </div>
    <div class="form">
      <div class="r2">
        <div class="fld"><label>Nombre</label>
          <input id="fNm" type="text" placeholder="Tu nombre"/></div>
        <div class="fld"><label>Teléfono</label>
          <input id="fTel" type="tel" placeholder="300 000 0000"/></div>
      </div>
      <div class="fld"><label>Dirección</label>
        <input id="fDir" type="text" placeholder="Cra 50 #30-20 · Barrio…"/></div>
      <div class="fld"><label>Forma de pago</label>
        <select id="fPago">
          <option value="EFECTIVO">💵 Efectivo</option>
          <option value="NEQUI">📱 Nequi</option>
          <option value="DAVIPLATA">💙 Daviplata</option>
          <option value="TRANSFERENCIA">🏦 Transferencia</option>
        </select>
      </div>
      <button class="sbtn" id="sbtn" onclick="enviar()">Confirmar pedido →</button>
    </div>
  </div>
</aside>

<div class="toast" id="toast"></div>

<script>
const TIENDA = 'CENTRAL';
const API_P  = `/api/productos?tienda=${TIENDA}`;
const API_O  = `/api/pedido`;

let all=[], shown=[], cart=[], labAct='';

async function load(){
  try{
    const r=await fetch(API_P);
    if(!r.ok)throw new Error();
    all=await r.json();
    shown=[...all];
    document.getElementById('heroNum').textContent=all.length.toLocaleString('es-CO');
    buildChips();
    render(shown);
  }catch(e){
    document.getElementById('grid').innerHTML=
      `<div class="state"><div style="font-size:48px;margin-bottom:12px">⚠️</div><p>No pudimos cargar. Intenta de nuevo.</p></div>`;
  }
}

function buildChips(){
  const labs=[...new Set(all.map(p=>p.laboratorio).filter(Boolean))].sort();
  const bar=document.getElementById('fBar');
  labs.slice(0,14).forEach(l=>{
    const b=document.createElement('button');
    b.className='chip';b.textContent=l;
    b.onclick=()=>setLab(l,b);
    bar.insertBefore(b,document.getElementById('cntLbl'));
  });
}
function setLab(lab,el){
  labAct=lab;
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('on'));
  el.classList.add('on');
  applyF();
}
function onSrch(v){
  document.getElementById('sClr').style.display=v?'block':'none';
  applyF();
}
function clrQ(){
  document.getElementById('q').value='';
  document.getElementById('sClr').style.display='none';
  applyF();
}
function applyF(){
  const q=document.getElementById('q').value.toLowerCase().trim();
  shown=all.filter(p=>{
    const mL=!labAct||p.laboratorio===labAct;
    const mQ=!q||p.descripcion.toLowerCase().includes(q)||(p.laboratorio||'').toLowerCase().includes(q);
    return mL&&mQ;
  });
  render(shown);
}

function ico(d){
  d=d.toLowerCase();
  if(/jarabe|suspens|soluci/.test(d))return'🍯';
  if(/crema|gel|ungüento|pomada/.test(d))return'🧴';
  if(/gotas|colirio|nasal/.test(d))return'💧';
  if(/inyect|ampolla|vial/.test(d))return'💉';
  if(/vitamina|mineral|suplemento/.test(d))return'🌿';
  if(/antibió|antibio/.test(d))return'🔬';
  if(/analg|dolor|ibupro|acetamin/.test(d))return'🩹';
  return'💊';
}
function pn(v){return parseInt((v||'0').toString().replace(/[^0-9]/g,''))||0}
function cop(v){const n=pn(v);return n?'$'+n.toLocaleString('es-CO'):'—'}

function render(list){
  document.getElementById('cntLbl').textContent=list.length+' producto'+(list.length!==1?'s':'');
  const g=document.getElementById('grid');
  if(!list.length){
    g.innerHTML=`<div class="state"><div style="font-size:48px;margin-bottom:12px">🔍</div><p>Sin resultados.</p></div>`;
    return;
  }
  g.innerHTML=list.map((p,i)=>`
    <div class="card" style="animation-delay:${(i%16)*.032}s">
      <div class="card-pic">${ico(p.descripcion)}</div>
      <div class="card-body">
        <div class="card-nm" title="${p.descripcion}">${p.descripcion}</div>
        <div class="card-lab">${p.laboratorio||'—'}</div>
        <div class="card-unit">${p.unidad||''}</div>
        <div class="card-foot">
          <div>
            <div class="card-pr">${cop(p.precioUnitario||p.precio)}</div>
            ${p.precioUnitario&&p.precio&&p.precioUnitario!==p.precio
              ?`<div class="card-pr2">caja ${cop(p.precio)}</div>`:''}
          </div>
          <button class="add-btn" onclick="add(${i})">+</button>
        </div>
      </div>
    </div>`).join('');
}

function add(i){
  const p=shown[i];
  const e=cart.find(c=>c.descripcion===p.descripcion);
  if(e)e.qty++;else cart.push({...p,qty:1,unit:pn(p.precioUnitario||p.precio)});
  syncCart();
  toast('✚ '+p.descripcion.slice(0,28)+'…');
}
function adjQ(i,d){cart[i].qty+=d;if(cart[i].qty<1)cart.splice(i,1);syncCart();}
function delI(i){cart.splice(i,1);syncCart();}

function syncCart(){
  const n=cart.reduce((s,c)=>s+c.qty,0);
  const t=cart.reduce((s,c)=>s+c.unit*c.qty,0);
  const badge=document.getElementById('cBadge');
  badge.textContent=n;badge.classList.toggle('on',n>0);
  document.getElementById('cartLbl').textContent=n>0?`Carrito (${n})`:'Carrito';
  document.getElementById('totV').textContent='$'+t.toLocaleString('es-CO');
  const body=document.getElementById('drwBody'),ft=document.getElementById('drwFt');
  if(!cart.length){
    body.innerHTML=`<div class="drw-mt"><div class="big">🧺</div><p>Tu carrito está vacío</p></div>`;
    ft.style.display='none';return;
  }
  ft.style.display='flex';
  body.innerHTML=cart.map((c,i)=>`
    <div class="ci">
      <div class="ci-ico">${ico(c.descripcion)}</div>
      <div class="ci-inf">
        <div class="ci-nm">${c.descripcion}</div>
        <div class="ci-pr">${cop(c.unit)} c/u</div>
      </div>
      <div class="qty">
        <button class="q-btn" onclick="adjQ(${i},-1)">−</button>
        <span class="q-num">${c.qty}</span>
        <button class="q-btn" onclick="adjQ(${i},+1)">+</button>
      </div>
      <button class="ci-del" onclick="delI(${i})">🗑</button>
    </div>`).join('');
}

function openDrawer(){document.getElementById('drawer').classList.add('open');document.getElementById('shade').classList.add('open')}
function closeDrawer(){document.getElementById('drawer').classList.remove('open');document.getElementById('shade').classList.remove('open')}

async function enviar(){
  const nm=document.getElementById('fNm').value.trim();
  const tel=document.getElementById('fTel').value.trim();
  const dir=document.getElementById('fDir').value.trim();
  const pg=document.getElementById('fPago').value;
  if(!nm||!tel||!dir){toast('⚠️ Completa todos los campos');return;}
  if(!cart.length){toast('⚠️ El carrito está vacío');return;}
  const btn=document.getElementById('sbtn');
  btn.disabled=true;btn.textContent='Enviando…';
  try{
    const tot=cart.reduce((s,c)=>s+c.unit*c.qty,0);
    const res=await fetch(API_O,{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        tienda:TIENDA,nombre:nm,telefono:tel,direccion:dir,metodoPago:pg,total:tot,
        negocioNombre:'Droguería La Central',
        carrito:cart.map(c=>({
          descripcion:c.descripcion,laboratorio:c.laboratorio,unidad:c.unidad,
          cantidad:c.qty,precioUnitario:c.unit,subtotal:c.unit*c.qty
        }))
      })
    });
    const d=await res.json();
    if(!res.ok)throw new Error(d.error||'Error al enviar');
    toast('✅ ¡Pedido enviado! ID: '+d.id);
    cart=[];syncCart();closeDrawer();
    ['fNm','fTel','fDir'].forEach(id=>document.getElementById(id).value='');
  }catch(e){toast('❌ '+e.message);}
  finally{btn.disabled=false;btn.textContent='Confirmar pedido →';}
}

let tt;
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  clearTimeout(tt);tt=setTimeout(()=>el.classList.remove('show'),2800);
}

load();
</script>
